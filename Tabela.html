<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <Style>
        body {
            font-family: sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }


        table td,
        table th {
            padding: 10px;
            border: 1px solid #333;
            color: black;
            text-align: left;
        }

        table caption {
            caption-side: top;
            text-align: center;
            font-size: 14px;
            font-style: italic;
            margin: 5px 0;

        }
        tfoot td, table th{
            background: #ddd;


        }
        tfoot td {
            font-style: italic;
        }
        .responsive-table {
            max-width: 100%;
            overflow-x: auto;
        }

    </Style>
</head>
