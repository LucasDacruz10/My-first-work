<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        #Heading {
            background: #e50914;
        }

        #Heading div {
            width: 80%;
            display: flex;
            background: #e50914;
            justify-content: space-between;
            margin: 0 auto;
        }

        #Heading .h1 {
            padding: 15px 0;
            font-size: 20px;
            text-transform:
            uppercase;

        }


        #Heading a {
            color: #fff;
            text-decoration: none;
            font-family: sans-serif;
        }
    </Style>
</head>

<body>
    <header id="Heading">
        <div>
            <h1>
                <a href="#">Netflix</a>
            </h1>


            <h2 class="h1">
                <a href="#">Netflix</a>
            </h2>
        </div>
    </header>
